[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Railway injects $PORT. The MongoDB MCP server reads MDB_MCP_HTTP_PORT from env.
# Set MDB_MCP_HTTP_PORT=${{PORT}} in Railway's Variables tab so it maps through.
#
# Health-check: the /mcp endpoint requires a POST with an MCP initialize payload,
# so it is NOT suitable for Railway's simple HTTP health check. If you want a
# health endpoint, set MDB_MCP_MONITORING_SERVER_PORT to a second port and
# configure Railway to probe that port instead.
